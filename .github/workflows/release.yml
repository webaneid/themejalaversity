name: Build & Upload Release Asset

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build CSS
        run: npm run build

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create theme zip
        run: |
          mkdir -p /tmp/build
          rsync -a . /tmp/build/jalaversity/ \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.claude' \
            --exclude='node_modules' \
            --exclude='scss' \
            --exclude='*.log' \
            --exclude='.DS_Store' \
            --exclude='package-lock.json' \
            --exclude='CLAUDE.md'
          cd /tmp/build
          zip -r jalaversity-${{ steps.version.outputs.VERSION }}.zip jalaversity/

      - name: Upload zip to release
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/build/jalaversity-${{ steps.version.outputs.VERSION }}.zip
